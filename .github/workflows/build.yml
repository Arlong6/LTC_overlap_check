name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:   # 允許手動觸發

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy openpyxl rich customtkinter pyinstaller

      - name: Build CLI version
        run: pyinstaller ltc_checker.spec --clean

      - name: Build UI version
        run: pyinstaller ltc_checker_ui.spec --clean

      - name: Create release zip
        run: |
          mkdir release
          copy dist\LTC_Checker.exe      release\LTC_Checker.exe
          copy dist\LTC_Checker_UI.exe   release\LTC_Checker_UI.exe
          copy 使用說明書.md              release\使用說明書.md
        shell: cmd

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LTC_Checker_Windows
          path: release/
          retention-days: 30

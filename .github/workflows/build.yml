name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:   # 允許手動觸發

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy openpyxl rich customtkinter pyinstaller

      - name: Build CLI version
        run: pyinstaller ltc_checker.spec --clean

      - name: Build UI version
        run: pyinstaller ltc_checker_ui.spec --clean

      - name: Create release zip
        run: |
          mkdir release
          copy dist\LTC_Checker.exe      release\LTC_Checker.exe
          copy dist\LTC_Checker_UI.exe   release\LTC_Checker_UI.exe
          copy 使用說明書.md              release\使用說明書.md
          cd release
          powershell Compress-Archive -Path * -DestinationPath ..\LTC_Checker_Windows.zip
        shell: cmd

      - name: Delete old latest release
        run: gh release delete latest --yes --cleanup-tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # 第一次沒有 release 時不報錯

      - name: Create latest release
        run: |
          gh release create latest LTC_Checker_Windows.zip `
            --title "LTC 重疊檢查工具（最新版）" `
            --notes "下載 LTC_Checker_Windows.zip，解壓縮後直接執行 LTC_Checker_UI.exe" `
            --latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
